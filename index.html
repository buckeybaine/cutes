<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
      }
      .wrap {
        width: min(92vw, 360px);
      }
      .calculator {
        background: #fff;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        padding: 1rem;
      }
      .display {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 0.75rem;
        padding: 0.9rem;
        border: none;
        border-radius: 10px;
        background: #111827;
        color: #f9fafb;
        text-align: right;
        font-size: 1.75rem;
      }
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 0.8rem;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: #e5e7eb;
      }
      button:hover { filter: brightness(0.96); }
      button:active { transform: scale(0.98); }
      .op { background: #f59e0b; color: #fff; }
      .eq { background: #3b82f6; color: #fff; grid-column: span 2; }
      .wide { grid-column: span 2; }
      .help {
        margin-top: 0.75rem;
        color: #374151;
        font-size: 0.9rem;
        line-height: 1.4;
        background: #e5e7eb;
        border-radius: 10px;
        padding: 0.65rem 0.75rem;
      }
      .help code { background: #d1d5db; padding: 0.05rem 0.35rem; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="calculator" aria-label="Calculator">
        <input class="display" id="display" type="text" value="0" readonly aria-live="polite" />
        <div class="buttons">
          <button type="button" data-action="clear" class="wide">C</button>
          <button type="button" data-action="delete">⌫</button>
          <button type="button" data-value="/" class="op">÷</button>

          <button type="button" data-value="7">7</button>
          <button type="button" data-value="8">8</button>
          <button type="button" data-value="9">9</button>
          <button type="button" data-value="*" class="op">×</button>

          <button type="button" data-value="4">4</button>
          <button type="button" data-value="5">5</button>
          <button type="button" data-value="6">6</button>
          <button type="button" data-value="-" class="op">−</button>

          <button type="button" data-value="1">1</button>
          <button type="button" data-value="2">2</button>
          <button type="button" data-value="3">3</button>
          <button type="button" data-value="+" class="op">+</button>

          <button type="button" data-value="0" class="wide">0</button>
          <button type="button" data-value=".">.</button>
          <button type="button" data-action="equals" class="eq">=</button>
        </div>
      </main>
      <section class="help" aria-label="How to use">
        <strong>How to use:</strong> Click buttons or use keyboard keys <code>0-9</code>, <code>+</code>, <code>-</code>, <code>*</code>, <code>/</code>, <code>.</code>, <code>Enter</code> (=), <code>Backspace</code> (⌫), <code>Escape</code> (C).
      </section>
    </div>

    <script>
      const display = document.getElementById('display');
      const operators = ['+', '-', '*', '/'];

      function setDisplay(value) { display.value = value; }
      function clearDisplay() { setDisplay('0'); }
      function isOperator(char) { return operators.includes(char); }

      function appendValue(value) {
        const current = display.value;
        if (current === 'Error') return setDisplay(value === '.' ? '0.' : value);

        if (isOperator(value)) {
          if (isOperator(current.slice(-1))) {
            return setDisplay(current.slice(0, -1) + value);
          }
          return setDisplay(current + value);
        }

        if (value === '.') {
          const lastNumber = current.split(/[+\-*/]/).pop();
          if (lastNumber.includes('.')) return;
          if (isOperator(current.slice(-1))) return setDisplay(current + '0.');
        }

        if (current === '0' && value !== '.') {
          return setDisplay(value);
        }

        setDisplay(current + value);
      }

      function deleteLast() {
        if (display.value.length <= 1 || display.value === 'Error') return clearDisplay();
        setDisplay(display.value.slice(0, -1));
      }

      function tokenize(expression) {
        const tokens = [];
        let number = '';
        for (const ch of expression) {
          if ('0123456789.'.includes(ch)) {
            number += ch;
          } else if (isOperator(ch)) {
            if (number) tokens.push(number), number = '';
            tokens.push(ch);
          }
        }
        if (number) tokens.push(number);
        return tokens;
      }

      function evaluateExpression(expression) {
        const tokens = tokenize(expression);
        if (!tokens.length) return 0;

        const values = [];
        const ops = [];
        const precedence = { '+': 1, '-': 1, '*': 2, '/': 2 };

        function applyOp() {
          const op = ops.pop();
          const b = values.pop();
          const a = values.pop();
          if (a === undefined || b === undefined) throw new Error('Malformed expression');
          if (op === '+') values.push(a + b);
          if (op === '-') values.push(a - b);
          if (op === '*') values.push(a * b);
          if (op === '/') {
            if (b === 0) throw new Error('Division by zero');
            values.push(a / b);
          }
        }

        for (const token of tokens) {
          if (!isNaN(Number(token))) {
            values.push(Number(token));
            continue;
          }

          while (ops.length && precedence[ops[ops.length - 1]] >= precedence[token]) {
            applyOp();
          }
          ops.push(token);
        }

        while (ops.length) applyOp();
        return values[0];
      }

      function calculate() {
        try {
          const expression = display.value;
          if (isOperator(expression.slice(-1))) {
            setDisplay('Error');
            return;
          }
          const result = evaluateExpression(expression);
          if (!Number.isFinite(result)) throw new Error('Invalid result');
          setDisplay(String(Number(result.toFixed(10))));
        } catch {
          setDisplay('Error');
        }
      }

      function handleInput(value, action) {
        if (action === 'clear') return clearDisplay();
        if (action === 'delete') return deleteLast();
        if (action === 'equals') return calculate();
        if (value) appendValue(value);
      }

      document.querySelector('.buttons').addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;
        handleInput(button.dataset.value, button.dataset.action);
      });

      document.addEventListener('keydown', (event) => {
        if ('0123456789.+-*/'.includes(event.key)) {
          event.preventDefault();
          return handleInput(event.key);
        }
        if (event.key === 'Enter' || event.key === '=') {
          event.preventDefault();
          return handleInput(undefined, 'equals');
        }
        if (event.key === 'Backspace') {
          event.preventDefault();
          return handleInput(undefined, 'delete');
        }
        if (event.key === 'Escape') {
          event.preventDefault();
          return handleInput(undefined, 'clear');
        }
      });
    </script>
  </body>
</html>
