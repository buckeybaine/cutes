<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator App</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Arial, sans-serif;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f3f4f6;
      }

      .calculator {
        width: min(92vw, 320px);
        background: white;
        border-radius: 16px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
        padding: 1rem;
      }

      .display {
        width: 100%;
        box-sizing: border-box;
        margin-bottom: 0.75rem;
        padding: 0.9rem;
        border: none;
        border-radius: 10px;
        background: #111827;
        color: #f9fafb;
        text-align: right;
        font-size: 1.75rem;
      }

      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 0.5rem;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 0.8rem;
        font-size: 1rem;
        font-weight: bold;
        cursor: pointer;
        background: #e5e7eb;
      }

      button:hover {
        filter: brightness(0.96);
      }

      button:active {
        transform: scale(0.98);
      }

      .op {
        background: #f59e0b;
        color: white;
      }

      .eq {
        background: #3b82f6;
        color: white;
        grid-column: span 2;
      }

      .wide {
        grid-column: span 2;
      }
    </style>
  </head>
  <body>
    <main class="calculator" aria-label="Calculator">
      <input class="display" id="display" type="text" value="0" readonly aria-live="polite" />
      <div class="buttons">
        <button type="button" data-action="clear" class="wide">C</button>
        <button type="button" data-action="delete">⌫</button>
        <button type="button" data-value="/" class="op">÷</button>

        <button type="button" data-value="7">7</button>
        <button type="button" data-value="8">8</button>
        <button type="button" data-value="9">9</button>
        <button type="button" data-value="*" class="op">×</button>

        <button type="button" data-value="4">4</button>
        <button type="button" data-value="5">5</button>
        <button type="button" data-value="6">6</button>
        <button type="button" data-value="-" class="op">−</button>

        <button type="button" data-value="1">1</button>
        <button type="button" data-value="2">2</button>
        <button type="button" data-value="3">3</button>
        <button type="button" data-value="+" class="op">+</button>

        <button type="button" data-value="0" class="wide">0</button>
        <button type="button" data-value=".">.</button>
        <button type="button" data-action="equals" class="eq">=</button>
      </div>
    </main>

    <script>
      const display = document.getElementById('display');

      function setDisplay(value) {
        display.value = value;
      }

      function appendValue(value) {
        if (display.value === '0' && value !== '.') {
          setDisplay(value);
          return;
        }
        setDisplay(display.value + value);
      }

      function clearDisplay() {
        setDisplay('0');
      }

      function deleteLast() {
        if (display.value.length <= 1) {
          clearDisplay();
          return;
        }
        setDisplay(display.value.slice(0, -1));
      }

      function calculate() {
        try {
          const expression = display.value.replace(/÷/g, '/').replace(/×/g, '*');
          const result = Function('return (' + expression + ')')();
          if (!Number.isFinite(result)) {
            throw new Error('Invalid result');
          }
          setDisplay(String(result));
        } catch {
          setDisplay('Error');
        }
      }

      document.querySelector('.buttons').addEventListener('click', (event) => {
        const button = event.target.closest('button');
        if (!button) return;

        const { value, action } = button.dataset;

        if (action === 'clear') {
          clearDisplay();
          return;
        }

        if (action === 'delete') {
          deleteLast();
          return;
        }

        if (action === 'equals') {
          calculate();
          return;
        }

        if (display.value === 'Error') {
          clearDisplay();
        }

        appendValue(value);
      });
    </script>
  </body>
</html>
